apiVersion: v1
kind: Pod
metadata:
  name: stage1-shuttle
  labels:
    user: tejas
    project: fiar-ms3
    stage: tensorizer
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 1800    # auto-kill after 30 min if not deleted manually
  containers:
  - name: shuttle
    image: python:3.11-slim
    command: ["sleep", "1800"]   # CPU shuttle — idle is acceptable for data-staging pods
    resources:
      requests:
        cpu: "1"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "1Gi"
    volumeMounts:
    - name: stage1-data
      mountPath: /workspace
  volumes:
  - name: stage1-data
    persistentVolumeClaim:
      claimName: stage1-pvc
