apiVersion: v1
kind: Pod
metadata:
  name: stage2-shuttle
  labels:
    user: tejas
    project: fiar-ms3
    stage: distillation-tensors
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 1800    # auto-kill after 30 min
  containers:
  - name: shuttle
    image: python:3.11-slim
    command: ["sleep", "1800"]
    resources:
      requests:
        cpu: "1"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "1Gi"
    volumeMounts:
    - name: stage2-data
      mountPath: /workspace
  volumes:
  - name: stage2-data
    persistentVolumeClaim:
      claimName: stage2-pvc
