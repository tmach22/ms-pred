apiVersion: v1
kind: Pod
metadata:
  name: test-pvc-mount
  namespace: wang-bioinf
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 120
  containers:
  - name: test
    image: python:3.11-slim
    imagePullPolicy: IfNotPresent
    command:
    - python
    - -c
    - |
      import os, platform
      print(f"Node  : {platform.node()}")
      print(f"PVC ls: {os.listdir('/workspace')}")
      print("PVC mount test PASSED")
    resources:
      requests:
        cpu: "1"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "512Mi"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
  volumes:
  - name: workspace
    persistentVolumeClaim:
      claimName: ms-pred-softlabel-pvc
