apiVersion: batch/v1
kind: Job
metadata:
  name: ms-pred-reranker-v20
  namespace: wang-bioinf
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 432000   # 5 days
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: reranker
        image: ghcr.io/tmach22/ms-pred-env:v1
        imagePullPolicy: IfNotPresent
        command:
        - bash
        - -c
        - |
          set -e

          echo "=== CUDA sanity check ==="
          python -c "import torch; torch.zeros(1).cuda(); print('CUDA OK:', torch.cuda.get_device_name(0))"

          echo "=== Cloning ms-pred ==="
          git clone --depth=1 https://github.com/tmach22/ms-pred.git /tmp/ms-pred

          echo "=== Installing ms-pred package ==="
          pip install --no-cache-dir -e /tmp/ms-pred

          echo "=== Downloading data ==="
          mkdir -p /tmp/data /tmp/weights
          curl -fL "https://huggingface.co/datasets/tejasjokin/ms-pred-data/resolve/main/splits_v2/train.parquet" \
            -o /tmp/data/train.parquet
          curl -fL "https://huggingface.co/datasets/tejasjokin/ms-pred-data/resolve/refs%2Fconvert%2Fparquet/default/validation/0000.parquet" \
            -o /tmp/data/val.parquet
          curl -fL "https://huggingface.co/datasets/tejasjokin/ms-pred-data/resolve/main/weights/nist_iceberg_generate.ckpt" \
            -o /tmp/weights/nist_iceberg_generate.ckpt
          echo "Downloads complete."

          echo "=== Starting Re-Ranker training ==="
          mkdir -p /workspace/results
          PYTHONPATH=/tmp/ms-pred python -u \
            /tmp/ms-pred/fiar_pipeline/scripts/train_distillation.py
        env:
        - name: TRAIN_PATH
          value: "/tmp/data/train.parquet"
        - name: VAL_PATH
          value: "/tmp/data/val.parquet"
        - name: CKPT_PATH
          value: "/tmp/weights/nist_iceberg_generate.ckpt"
        - name: CHECKPOINT_DIR
          value: "/workspace/results"
        - name: CPU_WORKERS
          value: "20"
        - name: BATCH_SIZE
          value: "256"
        - name: MAX_TRAIN_SAMPLES
          value: "32000"
        - name: MAX_VAL_SAMPLES
          value: "8000"
        - name: SAVE_EVERY_STEPS
          value: "25"
        - name: MAGMA_TIMEOUT
          value: "300"
        - name: RESUME_CKPT
          value: "/workspace/results/reranker_epoch01_step00125.pt"
        resources:
          requests:
            cpu: "24"
            memory: "40Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "24"
            memory: "40Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: results
          mountPath: /workspace/results
      volumes:
      - name: results
        persistentVolumeClaim:
          claimName: ms-pred-softlabel-pvc
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A10
                - Tesla-V100-SXM2-32GB
                - NVIDIA-L40S
                - NVIDIA-L4
                - NVIDIA-GeForce-RTX-3090
                - Tesla-V100-SXM2-16GB
                - NVIDIA-A40
