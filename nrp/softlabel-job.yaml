apiVersion: batch/v1
kind: Job
metadata:
  name: ms-pred-softlabel-v11
  namespace: wang-bioinf
spec:
  completionMode: Indexed
  completions: 8
  parallelism: 8
  backoffLimit: 12
  activeDeadlineSeconds: 28800   # 8h hard cap (full dataset / 8 shards ~3-4h expected)
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: softlabel
        image: pytorch/pytorch:2.1.0-cuda12.1-cudnn8-devel
        imagePullPolicy: IfNotPresent
        workingDir: /workspace
        command: ["bash", "-c"]
        args:
        - |
          set -e
          echo "=== CUDA sanity check ==="
          python3 -c "import torch,sys; torch.zeros(1).cuda(); print('CUDA OK:', torch.cuda.get_device_name(0))" || (echo "CUDA unavailable, failing fast for reschedule"; exit 1)
          echo "=== Installing system libs ==="
          DEBIAN_FRONTEND=noninteractive apt-get update -qq && \
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            gcc g++ \
            libxrender1 libxext6 libx11-6 \
            libgraphviz-dev graphviz \
            libcairo2-dev pkg-config \
            && rm -rf /var/lib/apt/lists/*

          echo "=== Installing PyG CUDA 12.1 wheels ==="
          pip install --no-cache-dir \
            torch-scatter torch-sparse torch-geometric \
            -f https://data.pyg.org/whl/torch-2.1.0+cu121.html

          echo "=== Installing DGL 1.1.3 ==="
          pip install --no-cache-dir \
            "dgl==1.1.3" \
            -f https://data.dgl.ai/wheels/cu121/repo.html

          echo "=== Installing ms-pred environment ==="
          pip install --no-cache-dir \
            rdkit \
            "pytorch-lightning==1.9.0" \
            omegaconf tqdm pyarrow pandas numpy \
            scikit-learn pathos \
            h5py matplotlib seaborn einops \
            "ray[tune]" \
            pubchempy lightgbm \
            msbuddy CairoSVG ipdb

          echo "=== Installing optional graph packages ==="
          pip install --no-cache-dir pygmtools pygraphviz || true

          echo "=== Setting PYTHONPATH ==="
          export PYTHONPATH="/workspace/code:/workspace/code/src:${PYTHONPATH}"

          echo "=== Running shard ${JOB_COMPLETION_INDEX} / 8 ==="
          python -u /workspace/code/fiar_pipeline/scripts/generate_soft_labels_nrp.py
        env:
        - name: NUM_SHARDS
          value: "8"
        - name: CPU_WORKERS
          value: "8"
        resources:
          requests:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: ms-pred-softlabel-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A10
                - NVIDIA-A40
                - NVIDIA-RTX-A6000
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-L4
                - NVIDIA-GeForce-RTX-4090
                - NVIDIA-GeForce-RTX-3090
                - NVIDIA-RTX-A5000
                - Tesla-V100-SXM2-32GB
                - Tesla-V100-PCIE-16GB
                - NVIDIA-TITAN-RTX
                - NVIDIA-GeForce-RTX-2080-Ti
                - Tesla-T4
                - Quadro-RTX-8000
                - Quadro-RTX-6000
                - NVIDIA-RTX-5000-Ada-Generation
                - NVIDIA-A2
                - Tesla-V100-SXM2-16GB
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: topology.kubernetes.io/region
                operator: In
                values: ["us-west"]
