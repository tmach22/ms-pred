apiVersion: batch/v1
kind: Job
metadata:
  name: ms-pred-softlabel-v2
  namespace: wang-bioinf
spec:
  completionMode: Indexed
  completions: 8
  parallelism: 8
  backoffLimit: 2
  activeDeadlineSeconds: 28800   # 8h hard cap (full dataset / 8 shards ~3-4h expected)
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: softlabel
        image: pytorch/pytorch:2.1.0-cuda12.1-cudnn8-devel
        imagePullPolicy: IfNotPresent
        workingDir: /workspace
        command: ["bash", "-c"]
        args:
        - |
          set -e
          echo "=== Installing dependencies ==="
          pip install --no-cache-dir \
            rdkit \
            "pytorch-lightning==1.9.0" \
            dgl -f https://data.dgl.ai/wheels/cu121/repo.html \
            omegaconf tqdm pyarrow pandas numpy scikit-learn pathos

          echo "=== Setting PYTHONPATH ==="
          export PYTHONPATH="/workspace/code:/workspace/code/src:${PYTHONPATH}"

          echo "=== Running shard ${JOB_COMPLETION_INDEX} / 8 ==="
          python -u /workspace/code/fiar_pipeline/scripts/generate_soft_labels_nrp.py
        env:
        - name: NUM_SHARDS
          value: "8"
        - name: CPU_WORKERS
          value: "20"
        resources:
          requests:
            cpu: "20"
            memory: "48Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "20"
            memory: "48Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: ms-pred-softlabel-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A10               # 24 GB VRAM, 34 nodes across east+central
                - NVIDIA-GeForce-RTX-3090  # 24 GB VRAM, 49 nodes across west+central+east
                - NVIDIA-RTX-A6000         # 48 GB VRAM, fallback
                - NVIDIA-L40               # 48 GB VRAM, fallback
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: topology.kubernetes.io/region
                operator: In
                values: ["us-west"]
